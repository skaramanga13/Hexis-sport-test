<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12232b">
<title>Hexis Sport - edition test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F2EC; --ink:#14181B; --graphite:#5A626B; --hair:#DED9CE;
  --deep:#12232B;            /* bleu instrument, accent principal */
  --deep-2:#1C3A45;
  --signal:#2FA88A;          /* vert mesure, statut "fait" */
  --warn:#C6772F;            /* ambre, "à vérifier" */
  --danger:#B23A48;
  --card:#FBFAF6;
  --shadow:0 1px 0 rgba(20,24,27,.04), 0 8px 24px -18px rgba(18,35,43,.5);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
  font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01";}
body{max-width:560px;margin:0 auto;min-height:100dvh}
#app{min-height:100dvh;display:flex;flex-direction:column}
.display{font-family:Fraunces,Georgia,serif;font-weight:600;letter-spacing:-.01em;line-height:1.05;margin:0}
.num{font-family:"IBM Plex Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;font-weight:500}
.num.unknown{color:var(--graphite);position:relative}
.unknown-tag{font-family:Inter,sans-serif;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;color:var(--graphite);
  border:1px solid var(--hair);border-radius:3px;padding:1px 4px;margin-left:6px;vertical-align:middle}

/* écrans pleins (migration/vide) */
.screen{flex:1;padding:32px 22px calc(28px + env(safe-area-inset-bottom))}
.screen.center{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:16px;min-height:100dvh}
.brandmark{font-family:Fraunces,serif;font-weight:600;font-size:30px;width:60px;height:60px;display:flex;align-items:center;justify-content:center;
  background:var(--deep);color:#EAF3F0;border-radius:16px;box-shadow:var(--shadow)}
.onb-steps{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--graphite)}
.brandmark.ok{background:var(--signal)}
.screen.center .display{font-size:2.15rem}
.lede{color:var(--graphite);font-size:1.02rem;line-height:1.5;margin:0}
.lede.small{font-size:.92rem}
.steps{margin:6px 0 4px;padding-left:1.1rem;color:var(--ink)}
.steps li{margin:.4rem 0;line-height:1.4}
.checks{list-style:none;padding:0;margin:8px 0;display:flex;flex-direction:column;gap:5px;width:100%}
.checks li{font-size:.86rem;color:var(--graphite)}
.checks li.ok{color:var(--deep-2)} .checks li.ko{color:var(--danger)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;margin:6px 0}
.stat{background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:12px 8px;text-align:center}
.stat-num{font-size:1.3rem}.stat-num .num{font-size:1.3rem}
.stat-label{font-size:.66rem;color:var(--graphite);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.note{font-size:.82rem;color:var(--warn);background:#FBF1E6;border:1px solid #EBD9C4;border-radius:10px;padding:10px 12px;width:100%;margin:4px 0}

/* boutons */
.btn{appearance:none;border:none;border-radius:11px;padding:13px 16px;font-family:Inter;font-size:.98rem;font-weight:600;
  cursor:pointer;width:100%;margin-top:8px;transition:transform .06s ease}
.btn:active{transform:scale(.985)}
.btn.primary{background:var(--deep);color:#EAF3F0;box-shadow:var(--shadow)}
.btn.ghost{background:transparent;color:var(--graphite);border:1px solid var(--hair);font-weight:500;box-shadow:none}
.btn.ghost.danger{color:var(--danger);border-color:#E4C4C8}
.btn.small{width:auto;padding:9px 13px;font-size:.85rem;margin:0}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

/* coquille app */
.main{flex:1;padding:22px 18px 96px;overflow-y:auto}
.hd{margin-bottom:18px}
.eyebrow{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--graphite);margin-bottom:6px}
.hello{font-size:1.9rem}
.screen-title{font-size:1.7rem;margin-bottom:16px}
.sub{font-family:Inter;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--graphite);margin:22px 0 8px}

.card{background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:12px 13px;box-shadow:var(--shadow);margin-bottom:9px}
.card-eyebrow{font-size:.68rem;text-transform:uppercase;letter-spacing:.09em;color:var(--graphite);margin-bottom:8px}
.lead-card{background:linear-gradient(160deg,var(--deep),var(--deep-2));border:none;color:#EAF3F0}
.lead-card .card-eyebrow{color:#9BB8B2}
.lead-title{font-family:Fraunces,serif;font-weight:600;font-size:1.7rem;line-height:1.05}
.lead-title.muted{color:#8AA6A0}
.lead-sub{color:#9BB8B2;font-size:.9rem;margin-top:4px}
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card-row .card{margin-bottom:0}
.kpi-date{font-family:Fraunces,serif;font-size:1.1rem;font-weight:600}
.kpi-date.muted{color:var(--graphite)}
.kpi-sub{font-size:.76rem;color:var(--graphite);margin-top:4px}
.kpi-pair{display:flex;flex-direction:column;gap:10px}
.kpi-cell-label{font-size:.72rem;color:var(--graphite)}
.kpi-cell-val{font-size:1.25rem;margin-top:2px}.kpi-cell-val .num{font-size:1.25rem}
.app-foot{text-align:center;color:var(--graphite);font-size:.8rem;font-style:italic;margin:26px 12px 4px;line-height:1.5}

/* bannière diagnostic (non bloquante) */
.diag-banner{display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;cursor:pointer;
  background:#FBF1E6;border:1px solid #EBD9C4;border-radius:14px;padding:13px 15px;margin-bottom:16px;color:var(--warn)}
.diag-banner b{font-size:.92rem}.diag-banner span{font-size:.78rem;color:#9A7A54}
.diag-banner.warn{background:#F7E9E9;border-color:#E4C4C8;color:var(--danger)}
.diag-banner.warn span{color:#9A5A62}

/* listes */
.list{display:flex;flex-direction:column;gap:8px}
.list-item{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;cursor:pointer;
  background:var(--card);border:1px solid var(--hair);border-radius:13px;padding:14px 15px}
.list-item:active{background:#F3F1EA}
.li-date{font-family:Fraunces,serif;font-weight:600;font-size:1.02rem;text-transform:capitalize}
.li-sub{font-size:.78rem;color:var(--graphite);margin-top:3px}
.chip{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:4px 9px;border-radius:20px;background:#EFEDE6;color:var(--graphite)}
.chip.warn{background:#FBF1E6;color:var(--warn)} .chip.ok{background:#E6F3EE;color:var(--signal)}
.empty{color:var(--graphite);text-align:center;padding:40px 0;font-size:.95rem}

/* détail séance */
.back{background:none;border:none;color:var(--deep-2);font-size:.9rem;font-weight:600;padding:0;margin-bottom:14px;cursor:pointer}
.legacy-note{display:flex;flex-direction:column;gap:3px;background:#FBF1E6;border:1px solid #EBD9C4;border-radius:12px;padding:12px 14px;margin-bottom:14px}
.legacy-note b{font-size:.88rem;color:var(--warn)}.legacy-note span{font-size:.76rem;color:#9A7A54}
.ex-card{padding:11px 12px}
.ex-name{font-family:Fraunces,serif;font-weight:600;font-size:1.12rem;margin-bottom:10px}
.set-table{display:flex;flex-direction:column;gap:1px;background:var(--hair);border-radius:9px;overflow:hidden}
.set-row{display:grid;grid-template-columns:56px 1fr 1fr;background:var(--card)}
.set-row.head{background:#F0EEE7}
.set-cell{padding:9px 12px;font-size:.9rem}
.set-row.head .set-cell{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--graphite)}
.set-cell.idx{color:var(--graphite)}
.set-row.unv{background:#FBF6EE}

/* données */
.action-list{display:flex;flex-direction:column;gap:8px;margin:8px 0}
.action{text-align:left;width:100%;cursor:pointer;background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:14px 16px}
.action:active{background:#F3F1EA}
.action-title{font-weight:600;font-size:.98rem}
.action-sub{font-size:.8rem;color:var(--graphite);margin-top:3px;line-height:1.4}

/* tabbar */
.tabbar{position:sticky;bottom:0;display:flex;background:rgba(251,250,246,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--hair);padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.tab{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;color:var(--graphite)}
.tab.active{color:var(--deep)}
.tab .ti{font-size:1.15rem;line-height:1}
.tab .tl{font-size:.66rem;font-weight:600}

/* toast */
.toast{position:fixed;left:50%;bottom:88px;transform:translate(-50%,12px);background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:11px;font-size:.88rem;opacity:0;transition:all .3s ease;z-index:50;pointer-events:none;max-width:88%}
.toast.show{opacity:1;transform:translate(-50%,0)}

/* modale de confirmation intégrée */
.modal-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(20,24,27,.45);padding:24px}
.modal-box{background:var(--card);border-radius:16px;padding:20px;max-width:340px;width:100%;box-shadow:0 20px 50px -12px rgba(18,35,43,.5)}
.modal-msg{font-size:.98rem;line-height:1.45;color:var(--ink);margin-bottom:16px}
.modal-btns{display:flex;gap:8px}
.modal-yes,.modal-no{flex:1;border:none;border-radius:11px;padding:12px;font-family:Inter;font-size:.92rem;font-weight:600;cursor:pointer}
.modal-yes{background:var(--deep);color:#EAF3F0}
.modal-yes.danger{background:var(--danger);color:#fff}
.modal-no{background:transparent;color:var(--graphite);border:1px solid var(--hair)}

@media (prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:2px solid var(--deep);outline-offset:2px}

/* saisie texte / prénom */
.text-input{width:100%;padding:10px 12px;border:1px solid var(--hair);border-radius:10px;background:var(--card);
  font-family:Inter;font-size:1rem;color:var(--ink);margin-top:8px}
.small-input{width:auto;flex:1;min-width:0}
.mini-form{display:flex;gap:8px;align-items:stretch;margin-top:4px}
.mini-form .btn.small{margin-top:8px;white-space:nowrap}

/* mode entraînement */
.ex-top{margin-bottom:10px}
.ex-presc{font-size:.78rem;color:var(--graphite);margin-top:3px}
.log-row{display:grid;grid-template-columns:30px 1fr 1fr 1fr;gap:6px;align-items:center;margin-bottom:5px}
.log-idx{font-family:"IBM Plex Mono",monospace;color:var(--graphite);font-size:.85rem}
.log-cell{position:relative;display:flex;align-items:center}
.log-input{width:100%;padding:9px 34px 9px 10px;border:1px solid var(--hair);border-radius:9px;background:var(--paper);
  font-family:"IBM Plex Mono",monospace;font-size:1.05rem;color:var(--ink);font-variant-numeric:tabular-nums}
.log-unit{position:absolute;right:10px;font-size:.7rem;color:var(--graphite);pointer-events:none}
.log-rest{font-size:.72rem;color:var(--signal);white-space:nowrap}
.link-btn{background:none;border:none;color:var(--deep-2);font-weight:600;font-size:.85rem;padding:4px 0;cursor:pointer}
.add-ex{display:flex;flex-direction:column;gap:8px}
.add-ex .btn.small{margin-top:2px}
.set-table.has-rest .set-row{grid-template-columns:46px 1fr 1fr 1fr}

/* proposition appliquer à toutes les séries */
.apply-prompt{position:fixed;left:50%;top:16px;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:10px;
  background:var(--deep);color:#EAF3F0;padding:14px 16px;border-radius:14px;font-size:.9rem;max-width:92%;width:340px;box-shadow:0 10px 30px -8px rgba(18,35,43,.6)}
.ap-msg{line-height:1.4}
.ap-btns{display:flex;gap:8px}
.ap-yes,.ap-no{border:none;border-radius:9px;padding:9px 12px;font-weight:600;font-size:.84rem;cursor:pointer;flex:1}
.ap-yes{background:var(--signal);color:#0A241C}.ap-no{background:rgba(255,255,255,.12);color:#EAF3F0}
.log-head .log-h{font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;color:var(--graphite);text-align:center}
.log-head{margin-bottom:4px}
.date-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.date-label{font-size:.8rem;color:var(--graphite)}
.date-input{padding:9px 12px;border:1px solid var(--hair);border-radius:10px;background:var(--card);font-family:Inter;font-size:.92rem;color:var(--ink)}
.log-row.editable{grid-template-columns:34px 1fr 1fr 1fr 28px}
.set-del{background:none;border:none;color:var(--danger);font-size:1.2rem;cursor:pointer;padding:0;line-height:1}

/* Ma semaine */
.week{margin-bottom:18px}
.week-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.week-title{font-family:Fraunces,serif;font-weight:600;font-size:1.1rem}
.week-nav{background:var(--card);border:1px solid var(--hair);border-radius:9px;width:34px;height:34px;font-size:1.1rem;color:var(--deep-2);cursor:pointer}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-cell{position:relative;background:var(--card);border:1px solid var(--hair);border-radius:11px;padding:8px 3px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:78px}
.day-cell.today{border-color:var(--deep);border-width:2px}
.day-name{font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;color:var(--graphite)}
.day-num{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:.95rem}
.day-type{font-size:.58rem;text-align:center;color:var(--deep-2);line-height:1.1;margin-top:2px}
.day-type.empty{color:var(--hair)}
.day-dot{position:absolute;bottom:6px;width:6px;height:6px;border-radius:50%}
.day-dot.done{background:var(--signal)}.day-dot.prog{background:var(--warn)}

/* segments (choix de type) */
.seg{display:flex;gap:6px;margin:8px 0 4px}
.seg.wrap{flex-wrap:wrap}
.seg-btn{flex:1;min-width:72px;background:var(--card);border:1px solid var(--hair);border-radius:10px;padding:10px 8px;font-size:.82rem;font-weight:600;color:var(--graphite);cursor:pointer}
.seg-btn.active{background:var(--deep);color:#EAF3F0;border-color:var(--deep)}

/* formulaire cardio */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:.72rem;color:var(--graphite)}
.field .text-input{margin-top:0}
.chip.cardio{background:#E7EEF3;color:var(--deep-2)}

/* menu de l'onglet Séance */
/* Progression */
.prog-chart{padding:14px 13px}
.prog-question{font-weight:600;font-size:.95rem;color:var(--ink);margin-bottom:10px;line-height:1.35}
.prog-svg{margin:2px 0 10px}
.prog-summary{font-size:.9rem;color:var(--deep-2);font-weight:600;margin-top:4px}
.prog-note{font-size:.8rem;color:var(--graphite);font-style:italic;margin-bottom:8px}
.prog-foot{font-size:.78rem;color:var(--graphite);text-align:center;margin-top:14px}
.prog-text{margin-top:8px;font-size:.85rem}
.prog-text summary{cursor:pointer;color:var(--deep-2)}
.prog-values{margin-top:6px;display:flex;flex-direction:column;gap:2px}
.prog-val-row{font-size:.82rem;color:var(--graphite)}
.prog-records{display:flex;flex-direction:column;gap:3px;background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.prog-rec{font-size:.86rem;color:var(--deep-2)}
.range-row,.metric-row,.charge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.range-btn,.metric-btn,.charge-btn{border:1px solid var(--hair);background:var(--card);border-radius:9px;padding:6px 10px;font-family:Inter;font-size:.82rem;color:var(--graphite);cursor:pointer}
.range-btn.active,.metric-btn.active,.charge-btn.active{background:var(--deep);color:#EAF3F0;border-color:var(--deep)}
.charge-lab{font-size:.8rem;color:var(--graphite)}

.apply-inline{background:var(--sand,#f4f1ea);border:1px solid var(--hair);border-radius:12px;padding:10px 12px;margin:8px 0 4px}
.apply-inline .ap-msg{font-size:.88rem;color:var(--ink);margin-bottom:8px}
.apply-inline .ap-btns{display:flex;gap:8px;flex-wrap:wrap}
.apply-inline .ap-yes{background:var(--deep);color:#EAF3F0;border:none;border-radius:9px;padding:8px 12px;font-family:Inter;font-size:.85rem;font-weight:600;cursor:pointer}
.apply-inline .ap-no{background:transparent;color:var(--graphite);border:1px solid var(--hair);border-radius:9px;padding:8px 12px;font-family:Inter;font-size:.85rem;cursor:pointer}
.version-line{text-align:center;font-size:.75rem;color:var(--graphite);margin-top:22px;opacity:.7}
.btn.ghost.active-choice{background:var(--deep);color:#EAF3F0;border-color:var(--deep);font-weight:600}
.sub-actions{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--hair)}
.seance-models{margin-bottom:12px}
.menu-list{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.menu-item{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:16px;cursor:pointer;text-align:left}
.menu-ico{font-size:1.1rem;width:26px;text-align:center;color:var(--deep-2)}
.menu-tx{flex:1;display:flex;flex-direction:column;gap:2px}
.menu-title{font-weight:600;font-size:1rem;color:var(--ink)}
.menu-sub{font-size:.78rem;color:var(--graphite)}
.menu-chev{color:var(--graphite);font-size:1.2rem}

/* éditeur de modèle */
.title-input{width:100%;font-family:Fraunces,serif;font-weight:600;font-size:1.5rem;border:none;border-bottom:2px solid var(--hair);background:transparent;padding:6px 2px;margin-bottom:14px;color:var(--ink)}
.tmpl-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.tmpl-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:10px 12px}
.arrows{display:flex;flex-direction:column;gap:2px}
.arrow{background:var(--paper);border:1px solid var(--hair);border-radius:6px;width:30px;height:24px;font-size:.85rem;cursor:pointer;color:var(--deep-2);line-height:1}
.arrow:disabled{opacity:.3;cursor:default}
.tmpl-tx{flex:1}
.tmpl-name{font-weight:600;font-size:.95rem}
.tmpl-sub{font-size:.75rem;color:var(--graphite);margin-top:2px}
.tmpl-rm{background:none;border:none;color:var(--danger);font-size:1.3rem;cursor:pointer;padding:0 4px;line-height:1}

/* chrono de récupération */
.ex-name-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.err-msg{font-family:"IBM Plex Mono",monospace;font-size:.78rem;color:var(--danger);background:#F7E9E9;border:1px solid #E4C4C8;border-radius:10px;padding:10px 12px;width:100%;word-break:break-word}
</style>
</head>
<body>
<div id="app"></div>
<script>window.CARNET_CONFIG={"appName":"Hexis Sport Test","namespace":"hexis-test:","showProgression":true,"showPrograms":true};</script>
<script>
/* ============================================================
 * ProgressionEngine — moteur de progression PUR (aucun DOM)
 * ------------------------------------------------------------
 * Règles fondamentales (spec v1.6) :
 *  - Sources de vérité : workoutSessions, cardioSessions, bodyMeasurements.
 *    Le moteur NE MODIFIE JAMAIS ces données.
 *  - Tout est recalculé à la demande. Aucun record/volume/tendance
 *    ne devient une 2e source de vérité.
 *  - Une valeur inconnue (null) n'est JAMAIS transformée en 0.
 *  - Une série n'est "faite" que si reps > 0 (charge préremplie seule = ignorée).
 *  - Les séances legacy non vérifiées sont exclues par défaut.
 *  - percentChange seulement si la 1re valeur est connue et != 0.
 *  - Chaque série renvoie la QUESTION à laquelle elle répond.
 * ============================================================ */
(function (root) {
  'use strict';

  var DAY = 86400000;
  // Périodes = fenêtres en JOURS GLISSANTS (pas des mois calendaires exacts).
  // Choix assumé pour la v1 : "3 mois" = 90 jours avant `now`. À revoir si l'on veut des mois calendaires.
  var RANGES = { '1m': 30, '3m': 90, '6m': 180, '1y': 365, 'all': null };

  // ---- utilitaires ------------------------------------------------
  // Une série "faite" = reps entier strictement positif ET charge non négative (ou absente).
  // Les valeurs aberrantes ne sont PAS transformées : elles sont ignorées des graphiques
  // et collectables via collectAnomalies() pour être signalées à l'utilisateur.
  function isIntPositive(n) { return typeof n === 'number' && isFinite(n) && n > 0 && Math.floor(n) === n; }

  // ajoute un exercice oublié à la séance en cours de modification
  function addExerciseToEdit(id, working) {

  }

  function action(title, sub, fn) { var b = el('button', 'action'); b.appendChild(el('div', 'action-title', title)); b.appendChild(el('div', 'action-sub', sub)); b.onclick = fn; return b; }

  function exportFlow() {
    var data = A.exportAll();
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
    a.href = url; a.download = 'carnet-lamine-' + stamp + '.json';
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    toast('Fichier exporté');
  }
  function importFlow() {
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'application/json,.json';
    inp.onchange = function () {
      var f = inp.files[0]; if (!f) return;
      var rd = new FileReader();
      rd.onload = function () {
        var json; try { json = JSON.parse(rd.result); } catch (e) { return toast('Fichier illisible'); }
        var r = A.importAny(json);
        if (r && (r.ok || r.datasetId)) { toast('Import réussi'); boot(); }
        else toast('Format non reconnu');
      };
      rd.readAsText(f);
    };
    inp.click();
  }

  function planLabel(ev) {
    if (ev.plannedType === 'workout') { var t = ev.templateId ? A.getTemplates().filter(function (x) { return x.id === ev.templateId; })[0] : null; return t ? t.name : 'Séance'; }
    var m = { cardio: 'Cardio', rest: 'Repos', 'active-recovery': 'Récup active' }; return m[ev.plannedType] || ev.plannedType;
  }
  function mondayOf(date, offsetWeeks) {
    var d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    var day = (d.getDay() + 6) % 7; // 0 = lundi
    d.setDate(d.getDate() - day + (offsetWeeks || 0) * 7);
    return d;
  }
  function addDays(d, n) { var x = new Date(d.getFullYear(), d.getMonth(), d.getDate()); x.setDate(x.getDate() + n); return x; }
  function isoOf(d) { return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2); }
  function weekRangeLabel(mon) { var sun = addDays(mon, 6); return mon.getDate() + '–' + sun.getDate() + ' ' + sun.toLocaleDateString('fr-FR', { month: 'short' }); }
  function latestPlanFor(dISO) { var evs = A.getPlannedEvents().filter(function (p) { return p.date === dISO; }); return evs.length ? evs[evs.length - 1] : null; }
  function activityForPlan(ev) {
    if (!ev || !ev.linkedId) return null;
    return A.getSessions().filter(function (s) { return s.id === ev.linkedId; })[0] || A.getCardioSessions().filter(function (c) { return c.id === ev.linkedId; })[0] || null;
  }

  // ── Écran d'un jour ────────────────────────────────────────────────
  function openDay(dISO) {
    var main = document.getElementById('main'); clear(main);
    var back = el('button', 'back', '‹ Ma semaine'); back.onclick = function () { renderApp('accueil'); }; main.appendChild(back);
    main.appendChild(el('h1', 'display screen-title', fmtDate(dISO)));
    var ev = latestPlanFor(dISO);
    var linked = activityForPlan(ev);

    // choix du type de jour
    main.appendChild(el('div', 'card-eyebrow', 'Type de journée'));
    var seg = el('div', 'seg');
    PLAN_TYPES.forEach(function (pt) {
      var b = el('button', 'seg-btn' + (ev && ev.plannedType === pt[0] ? ' active' : ''));
      b.textContent = pt[1];
      b.onclick = function () { setDayType(dISO, pt[0], !!linked); };
      seg.appendChild(b);
    });
    main.appendChild(seg);

    if (linked) {
      var warn = el('div', 'note');
      warn.textContent = 'Une activité est déjà enregistrée pour ce jour. Modifier le planning ne modifiera pas l\'historique.';
      main.appendChild(warn);
    }

    if (!ev) { main.appendChild(el('p', 'lede small', 'Choisis un type de journée ci-dessus.')); return; }

    // action selon le type
    if (ev.plannedType === 'workout') {
      var b = el('button', 'btn primary', ev.status === 'done' ? 'Séance enregistrée ✓ — en refaire une' : 'Démarrer la séance');
      b.onclick = function () { startWorkoutForDay(dISO, ev); };
      main.appendChild(b);
      if (linked) main.appendChild(sessionSummaryCard(linked, dISO));
    } else if (ev.plannedType === 'cardio') {
      if (linked) {
        main.appendChild(cardioSummaryCard(linked));
        var e = el('button', 'btn ghost', 'Modifier ce cardio'); e.onclick = function () { cardioForm(dISO, linked.id); }; main.appendChild(e);
        var del = el('button', 'btn ghost danger', 'Supprimer ce cardio'); del.onclick = function () { askConfirm('Supprimer ce cardio ? L\'entrée disparaîtra de l\'historique.', function () { A.deleteCardioSession(linked.id); ev.linkedId = null; ev.status = 'planned'; A.savePlannedEvent(ev); toast('Cardio supprimé'); openDay(dISO); }, { danger: true, yesLabel: 'Supprimer' }); }; main.appendChild(del);
      }
      else { var b2 = el('button', 'btn primary', 'Enregistrer le cardio'); b2.onclick = function () { cardioForm(dISO, null); }; main.appendChild(b2); }
    } else { // rest / active-recovery
      if (ev.status === 'done') {
        main.appendChild(el('p', 'lede small', 'Marqué comme fait.'));
        var un = el('button', 'btn ghost', 'Annuler « fait »'); un.onclick = function () { ev.status = 'planned'; A.savePlannedEvent(ev); openDay(dISO); }; main.appendChild(un);
      } else {
        var done = el('button', 'btn primary', 'Marquer comme fait'); done.onclick = function () { askConfirm('Marquer ce jour comme fait ?', function () { ev.status = 'done'; A.savePlannedEvent(ev); toast('Marqué comme fait'); openDay(dISO); }, { yesLabel: 'Marquer fait' }); }; main.appendChild(done);
        var cancel = el('button', 'btn ghost', 'Annuler'); cancel.onclick = function () { renderApp('accueil'); }; main.appendChild(cancel);
      }
    }
  }
  function setDayType(dISO, type, hasLinked) {
    var ev = latestPlanFor(dISO);
    if (!ev) ev = { date: dISO, plannedType: type, status: 'planned', templateId: null, linkedId: null, source: 'user' };
    else { ev.plannedType = type; } // linkedId/activité préservés — jamais touchés
    if (type !== 'workout') ev.templateId = null;
    A.savePlannedEvent(ev);
    openDay(dISO);
  }
  function startWorkoutForDay(dISO, ev) {

    if (tpl) startDraftFromTemplate(tpl); else A.saveDraft({ type: 'Séance', templateId: null, date: dISO, startedAt: new Date().toISOString(), entries: [] });
    var d = A.getDraft(); d.date = dISO; d.planDate = dISO; A.saveDraft(d);

  function fmtNum(v) { return (Math.round(v * 100) / 100).toString().replace('.', ','); }
  function fmtDateShort(iso) { try { var d = new Date(iso + 'T00:00:00'); return d.getDate() + '/' + (d.getMonth() + 1); } catch (e) { return iso; } }

  // Graphique en SVG natif (aucune dépendance) + version texte accessible.
  function svgChart(series, main) {
    var pts = series.points || [];
    var card = el('section', 'card prog-chart');
    card.appendChild(el('div', 'prog-question', series.question));
    if (series.notApplicable) { card.appendChild(el('p', 'empty', series.notApplicableReason || 'Non calculable.')); main.appendChild(card); return; }
    if (!pts.length) { card.appendChild(el('p', 'empty', 'Aucune donnée enregistrée.')); main.appendChild(card); return; }
    if (pts.length === 1) { card.appendChild(el('p', 'prog-note', 'Une première valeur est enregistrée (' + fmtNum(pts[0].value) + ' ' + series.unit + '). Il faut au moins deux valeurs pour mesurer une évolution.')); }
    var W = 300, H = 150, padL = 34, padR = 10, padT = 12, padB = 22;
    var ys = pts.map(function (p) { return p.value; });
    var minY = Math.min.apply(null, ys), maxY = Math.max.apply(null, ys);
    if (minY === maxY) { minY -= 1; maxY += 1; }
    var plotW = W - padL - padR, plotH = H - padT - padB;
    function X(i) { return padL + (pts.length === 1 ? plotW / 2 : plotW * i / (pts.length - 1)); }
    function Y(v) { return padT + plotH * (1 - (v - minY) / (maxY - minY)); }
    var dPath = pts.map(function (p, i) { return (i ? 'L' : 'M') + X(i).toFixed(1) + ' ' + Y(p.value).toFixed(1); }).join(' ');
    var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" aria-label="' + series.question + '">';
    svg += '<line x1="' + padL + '" y1="' + padT + '" x2="' + padL + '" y2="' + (H - padB) + '" stroke="#d9d5cc"/>';
    svg += '<line x1="' + padL + '" y1="' + (H - padB) + '" x2="' + (W - padR) + '" y2="' + (H - padB) + '" stroke="#d9d5cc"/>';
    svg += '<text x="2" y="' + (Y(maxY) + 4) + '" font-size="9" fill="#7a756c">' + fmtNum(maxY) + '</text>';
    svg += '<text x="2" y="' + (Y(minY) + 4) + '" font-size="9" fill="#7a756c">' + fmtNum(minY) + '</text>';
    if (pts.length > 1) svg += '<path d="' + dPath + '" fill="none" stroke="#1f2d34" stroke-width="2"/>';
    pts.forEach(function (p, i) { svg += '<circle cx="' + X(i).toFixed(1) + '" cy="' + Y(p.value).toFixed(1) + '" r="3" fill="#1f2d34"/>'; });
    svg += '<text x="' + padL + '" y="' + (H - 6) + '" font-size="9" fill="#7a756c">' + fmtDateShort(pts[0].date) + '</text>';
    if (pts.length > 1) svg += '<text x="' + (W - padR) + '" y="' + (H - 6) + '" font-size="9" fill="#7a756c" text-anchor="end">' + fmtDateShort(pts[pts.length - 1].date) + '</text>';
    svg += '</svg>';
    var holder = el('div', 'prog-svg'); holder.innerHTML = svg; card.appendChild(holder);
    var s = series.summary;
    if (s && s.count >= 2) {
      var bits = 'Départ ' + fmtNum(s.first) + ' ' + series.unit + ' → actuel ' + fmtNum(s.latest) + ' ' + series.unit;
      if (s.absoluteChange != null) bits += '  (' + (s.absoluteChange >= 0 ? '+' : '') + fmtNum(s.absoluteChange) + ' ' + series.unit + ')';
      if (s.percentChange != null) bits += '  ' + (s.percentChange >= 0 ? '+' : '') + fmtNum(s.percentChange) + ' %';
      card.appendChild(el('div', 'prog-summary', bits));
    }
    var det = el('details', 'prog-text');
    var sum = el('summary', ''); sum.textContent = 'Voir les valeurs'; det.appendChild(sum);
    var ul = el('div', 'prog-values');
    pts.forEach(function (p) { ul.appendChild(el('div', 'prog-val-row', fmtDateShort(p.date) + ' : ' + fmtNum(p.value) + ' ' + series.unit + (p.reps != null ? ' (' + p.reps + ' reps)' : ''))); });
    det.appendChild(ul); card.appendChild(det);
    main.appendChild(card);
  }

  function ensureLibraryExercise(libId) {
    var def = HexisLibrary.byId(libId); if (!def) return null;
    var found = A.getExercises().filter(function (e) { return e.libId === libId; })[0];
    if (found) return found;
    var ex = A.createExercise(def.name, null);
    ex.libId = def.id; ex.category = def.category; ex.exerciseType = def.exerciseType;
    ex.aliases = (ex.aliases || []).concat(def.aliases);
    ex.musclesPrimary = def.musclesPrimary; ex.musclesSecondary = def.musclesSecondary;
    ex.movementPattern = def.movementPattern; ex.equipment = def.equipment; ex.unilateral = def.unilateral;
    ex.defaults = { setsTarget: 3, repsTarget: def.defaultRepRange ? (def.defaultRepRange.min + '-' + def.defaultRepRange.max) : null, restSeconds: def.defaultRestSeconds };
    A.saveExercise(ex); return ex;
  }

  function programPreview(main, programId) {
    var p = HexisLibrary.programById(programId); if (!p) return viewProgrammes(main);
    clear(main);
    var back = el('button', 'back', '‹ Programmes'); back.onclick = function () { viewProgrammes(main); }; main.appendChild(back);
    main.appendChild(el('h1', 'display screen-title', p.name));
    main.appendChild(el('p', 'lede small', p.daysPerWeek + ' jours/semaine — ' + p.description));
    if (p.customizable) main.appendChild(el('p', 'prog-note', 'Base à personnaliser — destinée aux personnes déjà autonomes.'));
    p.templates.forEach(function (t) {
      var card = el('section', 'card');
      card.appendChild(el('div', 'card-eyebrow', t.name + ' · ' + t.items.length + ' exercices'));
      t.items.forEach(function (item) {

      });
      main.appendChild(card);
    });
    var install = el('button', 'btn primary', 'Installer ce programme');
    install.onclick = function () {
      askConfirm('Installer « ' + p.name + ' » ? Une copie modifiable sera créée dans tes modèles (aucune charge imposée, tes séances actuelles ne changent pas).', function () {
        try { var res = HexisLibrary.installProgram(A, programId); toast(res.templatesCreated + ' séance(s) ajoutée(s)'); viewModeles(main); }
        catch (e) { toast('Installation impossible'); }
      }, { yesLabel: 'Installer' });
    };
    main.appendChild(install);
  }

  // Autocomplétion branchée sur la bibliothèque structurée (utilisée par le sélecteur)
  function libraryAutocomplete(query) {
    if (!PROGRAMS_ON) return [];
    return HexisLibrary.searchExercises(query, { limit: 8 });
  }

  function startDraftFromTemplate(t) {
    var exById = {}; A.getExercises().forEach(function (e) { exById[e.id] = e; });
    var entries = t.items.map(function (it) {
      var ex = exById[it.exerciseId];
      var charge = ex && ex.startingLoad ? ex.startingLoad.charge : null;
      var nSets = (it.prescription && it.prescription.setsTarget) || 3;
      var sets = [];
      for (var i = 0; i < nSets; i++) sets.push({ charge: charge, reps: null, restSeconds: null });
      return { exerciseId: it.exerciseId, name: ex ? ex.name : 'Exercice', prescriptionSnapshot: Object.assign({}, it.prescription), sets: sets };
    });
    A.saveDraft({ type: t.name, templateId: t.id, templateName: t.name, installedFrom: t.installedFrom || null, date: todayISO(), startedAt: new Date().toISOString(), entries: entries });
  }

  // -- Écran de saisie de la séance en cours --------------------------
  function seanceLog(main, draft) {
    var menuLink = el('button', 'back', '‹ Menu Séance (modèles, bibliothèque)');
    menuLink.onclick = function () { SEANCE_FORCE_MENU = true; renderApp('seance'); };
    main.appendChild(menuLink);
    var head = el('header', 'hd');
    head.appendChild(el('div', 'eyebrow', 'Séance en cours'));
    head.appendChild(el('h1', 'display hello', draft.type));
    // date modifiable (permet de noter un jour oublié)
    var drow = el('div', 'date-row');
    drow.appendChild(el('span', 'date-label', 'Date :'));
    var dI = el('input', 'date-input'); dI.type = 'date'; dI.value = draft.date || todayISO();
    dI.onchange = function () { draft.date = dI.value || todayISO(); A.saveDraft(draft); };
    drow.appendChild(dI);
    head.appendChild(drow);
    main.appendChild(head);

    draft.entries.forEach(function (en, ei) {
      var card = el('section', 'card ex-card');
      var top = el('div', 'ex-top');
      top.appendChild(el('div', 'ex-name', en.name));
      top.appendChild(el('div', 'ex-presc', prescLine(en.prescriptionSnapshot)));
      card.appendChild(top);
      // en-têtes de colonnes
      var head = el('div', 'log-row log-head');
      head.appendChild(el('div', 'log-idx', ''));
      head.appendChild(el('div', 'log-h', 'Charge'));
      head.appendChild(el('div', 'log-h', 'Rép.'));
      head.appendChild(el('div', 'log-h', 'Récup'));
      card.appendChild(head);
      // séries
      en.sets.forEach(function (st, si) {
        var row = el('div', 'log-row');
        row.appendChild(el('div', 'log-idx', 'S' + (si + 1)));
        row.appendChild(logInput(st.charge, 'kg', function (v) { st.charge = v; A.saveDraft(draft); maybeApplyAll(en, si, 'charge', v, 'charge', card, row); }));
        row.appendChild(logInput(st.reps, 'Rép.', function (v) { st.reps = v; A.saveDraft(draft); maybeApplyAll(en, si, 'reps', v, 'répétitions', card, row); }));
        row.appendChild(logInput(st.restSeconds, 's', function (v) { st.restSeconds = v; A.saveDraft(draft); maybeApplyAll(en, si, 'restSeconds', v, 'récup', card, row); }));
        card.appendChild(row);
      });
      var addSet = el('button', 'link-btn', '+ série');
      addSet.onclick = function () { var last = en.sets[en.sets.length - 1] || {}; en.sets.push({ charge: last.charge != null ? last.charge : null, reps: null, restSeconds: last.restSeconds != null ? last.restSeconds : null }); A.saveDraft(draft); renderApp('seance'); };
      card.appendChild(addSet);
      main.appendChild(card);
    });

    if (!draft.entries.length) {
      var empty = el('p', 'empty', 'Séance libre : ajoute ton premier exercice ci-dessous (son nom, puis sa charge).');
      main.appendChild(empty);
    }

    // ajouter un exercice
    var addWrap = el('section', 'card add-ex');
    addWrap.appendChild(el('div', 'card-eyebrow', 'Ajouter un exercice'));
    var nameI = el('input', 'text-input'); nameI.type = 'text'; nameI.placeholder = 'Nom de l\'exercice (ex. Développé couché)';
    var chargeI = el('input', 'text-input small-input'); chargeI.type = 'number'; chargeI.inputMode = 'decimal'; chargeI.placeholder = 'Charge kg (optionnel)';
    var addB = el('button', 'btn small', '+ Ajouter à la séance');
    addB.onclick = function () {
      var nm = (nameI.value || '').trim(); if (!nm) { nameI.focus(); return; }
      var ex = A.createExercise(nm, chargeI.value || null);
      draft.entries.push({ exerciseId: ex.id, name: nm, prescriptionSnapshot: { setsTarget: 3, repsTarget: null, restSeconds: 90 }, sets: [ { charge: chargeI.value ? Number(chargeI.value) : null, reps: null, restSeconds: null }, { charge: chargeI.value ? Number(chargeI.value) : null, reps: null, restSeconds: null }, { charge: chargeI.value ? Number(chargeI.value) : null, reps: null, restSeconds: null } ] });
      A.saveDraft(draft); renderApp('seance');
    };
    addWrap.appendChild(nameI); addWrap.appendChild(chargeI); addWrap.appendChild(addB);
    main.appendChild(addWrap);

    // valider / annuler
    var valid = el('button', 'btn primary', 'Valider la séance');
    valid.onclick = function () { validateSession(draft); };
    main.appendChild(valid);
    var cancel = el('button', 'btn ghost danger', 'Abandonner cette séance');
    cancel.onclick = function () { askConfirm('Abandonner la séance en cours ? Rien ne sera enregistré.', function () { A.clearDraft(); renderApp('accueil'); }, { danger: true, yesLabel: 'Abandonner' }); };
    main.appendChild(cancel);


  }

  function prescLine(p) {
    if (!p) return '';
    var parts = [];
    if (p.setsTarget) parts.push(p.setsTarget + ' × ' + (p.repsTarget || '—'));
    if (p.restSeconds != null) parts.push('récup ' + p.restSeconds + ' s');
    return parts.join(' · ');
  }

  // champ de saisie compact (charge ou reps)
  function logInput(val, label, onchange) {
    var wrap = el('div', 'log-cell');
    var inp = el('input', 'log-input'); inp.type = 'number'; inp.inputMode = 'numeric'; inp.placeholder = label;
    if (val != null) inp.value = val;
    inp.onchange = function () { var v = inp.value === '' ? null : Number(inp.value); onchange(v); };
    wrap.appendChild(inp);
    wrap.appendChild(el('span', 'log-unit', label));
    return wrap;
  }

  // proposition "appliquer à toutes les séries" — déclenchée depuis la 1re série
  function maybeApplyAll(en, si, field, v, label, card, row) {
    if (v == null || v === '') return;
    if (si !== 0) return;               // on ne propose qu'à partir de la première série
    if (en.sets.length < 2) return;
    var others = en.sets.filter(function (s, i) { return i !== si && (s[field] == null || s[field] === ''); });
    if (!others.length) return;         // rien à remplir
    var unit = field === 'charge' ? ' kg' : (field === 'restSeconds' ? ' s' : '');
    var msg = 'Appliquer ' + v + unit + ' de ' + label + ' à toutes les séries ?';
    function applyAll() { en.sets.forEach(function (s) { s[field] = v; }); var d = A.getDraft(); A.saveDraft(d); renderApp('seance'); }
    // Édition test : bandeau intégré DANS la carte de l'exercice, juste sous la série modifiée.
    if (V16_UX && card && row) { showApplyInline(card, row, msg, applyAll); return; }
    showApplyPrompt(msg, applyAll);     // quotidienne : comportement d'origine
  }
  function showApplyInline(card, row, msg, onAll) {
    // retirer un éventuel bandeau inline déjà présent dans la carte
    (card.children || []).slice().forEach(function (c) { if (c.className && (' ' + c.className + ' ').indexOf(' apply-inline ') >= 0) c.remove(); });
    var bar = el('div', 'apply-inline');
    bar.appendChild(el('div', 'ap-msg', msg));
    var btns = el('div', 'ap-btns');
    var yes = el('button', 'ap-yes', 'Appliquer à toutes'); yes.onclick = function () { bar.remove(); onAll(); };
    var no = el('button', 'ap-no', 'Seulement cette série'); no.onclick = function () { bar.remove(); };
    btns.appendChild(yes); btns.appendChild(no); bar.appendChild(btns);
    // insérer juste après la série modifiée si possible, sinon à la fin de la carte
    if (typeof card.insertBefore === 'function' && row && row.nextSibling) { try { card.insertBefore(bar, row.nextSibling); return; } catch (e) {} }
    card.appendChild(bar);
  }
  function showApplyPrompt(msg, onAll) {
    var old = document.getElementById('apply-prompt'); if (old) old.remove();
    var bar = el('div', 'apply-prompt'); bar.id = 'apply-prompt';
    bar.appendChild(el('div', 'ap-msg', msg));
    var btns = el('div', 'ap-btns');
    var yes = el('button', 'ap-yes', 'Appliquer à toutes'); yes.onclick = function () { bar.remove(); onAll(); };
    var no = el('button', 'ap-no', 'Seulement cette série'); no.onclick = function () { bar.remove(); };
    btns.appendChild(yes); btns.appendChild(no); bar.appendChild(btns);
    document.body.appendChild(bar);
  }

  // -- Valider la séance : crée une vraie workoutSession --------------
  function realSet(s) { return s.reps != null && s.reps > 0; }   // une série n'est "faite" que si des reps sont saisies
  function validateSession(draft) {
    var withReal = draft.entries.filter(function (en) { return en.sets.some(realSet); });
    if (!withReal.length) { toast('Saisis au moins les répétitions d\'une série avant de valider'); return; }
    // compte les EXERCICES entièrement sans série réalisée (pas les séries vides une à une)
    var emptyExercises = draft.entries.filter(function (en) { return !en.sets.some(realSet); }).length;
    if (emptyExercises === 0) return finalizeSession(draft);  // tout est renseigné -> direct
    askConfirm(emptyExercises + ' exercice(s) sans répétition seront ignorés. Terminer quand même la séance ?',
      function () { finalizeSession(draft); },
      { yesLabel: 'Terminer la séance', noLabel: 'Revenir compléter' });
  }
  function finalizeSession(draft) {
    var started = draft.startedAt ? new Date(draft.startedAt) : null;
    var now = new Date();
    var session = {
      date: draft.date, timezone: Intl && Intl.DateTimeFormat ? Intl.DateTimeFormat().resolvedOptions().timeZone : null,
      templateId: draft.templateId, status: 'completed', source: 'user',
      startedAt: draft.startedAt || null, completedAt: now.toISOString(),
      durationSeconds: started ? Math.round((now - started) / 1000) : null,
      entries: draft.entries.map(function (en) {
        return { exerciseId: en.exerciseId, prescriptionSnapshot: en.prescriptionSnapshot, prescriptionSnapshotReconstructed: false,
          sets: en.sets.filter(realSet).map(function (s) { return { charge: s.charge, reps: s.reps, restSeconds: s.restSeconds != null ? s.restSeconds : null, unverified: false }; }) };
      }).filter(function (en) { return en.sets.length; })   // un exercice sans série réellement faite est écarté
    };
    // Snapshot du nom du modèle au moment de l'enregistrement (édition test).
    // Figé : renommer le modèle plus tard ne change pas l'historique.
    if (V16_UX && draft.templateId) {
      var srcT = A.getTemplates().filter(function (x) { return x.id === draft.templateId; })[0];
      session.templateName = (srcT && srcT.name) || draft.templateName || null;
      session.installedFrom = (srcT && srcT.installedFrom) || draft.installedFrom || null;
    }
    // charge de départ mise à jour UNIQUEMENT depuis une série réellement effectuée
    draft.entries.forEach(function (en) {
      var lastCharge = null; en.sets.forEach(function (s) { if (realSet(s) && s.charge != null) lastCharge = s.charge; });
      if (lastCharge != null) { var ex = A.getExercises().filter(function (e) { return e.id === en.exerciseId; })[0]; if (ex) { ex.startingLoad = { charge: lastCharge, date: draft.date, source: 'session' }; A.saveExercise(ex); } }
    });
    var savedSession = A.saveWorkoutSession(session);
    // relier au jour planifié si la séance a été démarrée depuis la semaine
    if (draft.planDate) {
      var ev = A.getPlannedEvents().filter(function (p) { return p.date === draft.planDate; }).pop();
      if (!ev) ev = { date: draft.planDate, plannedType: 'workout', status: 'planned', templateId: draft.templateId || null, linkedId: null, source: 'user' };
      ev.plannedType = 'workout'; ev.linkedId = savedSession.id; ev.status = 'done';
      A.savePlannedEvent(ev);
    }
    A.clearDraft();
    toast('Séance enregistrée');
    renderApp('historique');
  }

  function _startBoot() { try { boot(); } catch (e) { try { renderError(e, 'démarrage'); } catch (_) {} } }
  if (document.readyState === 'loading') { window.addEventListener('DOMContentLoaded', _startBoot); }
  else { _startBoot(); }
  // Safari : au retour depuis le cache (bfcache), DOMContentLoaded ne refire pas
  window.addEventListener('pageshow', function (e) { if (e && e.persisted) { _startBoot(); } });
})();

</script>
